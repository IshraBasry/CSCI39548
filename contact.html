<h1 class="contact-title">Contact Us</h1>


<div class="map-container">
  <iframe 
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3981.877252284364!2d72.72141807349014!3d3.615535150111793!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b40d59c96c00903%3A0x1194521794ea9ab9!2sIthaa%20Undersea%20Restaurant!5e0!3m2!1sen!2sus!4v1773193158024!5m2!1sen!2sus" 
    width="100%" 
    height="400" 
    style="border:0;" 
    allowfullscreen="" 
    loading="lazy" 
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>


<div class="contact-form">
  <form>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Your email" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" placeholder="Your message" required></textarea>

    <button type="submit">Send Us A Message</button>
  </form>
</div>

</body>
